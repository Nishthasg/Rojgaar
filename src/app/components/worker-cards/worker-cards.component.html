<div class="card p-3">
<div class="d-flex gap-3">
<div class="img-wrapper">
    <img src="../../../assets/Images/home.jpg" alt="Worker img" height="80" width="80">
</div>
<div class="title">
    <h5>{{worker.name}}</h5>
    <p class="text-primary">{{worker.profession}}</p>
    <p>
        <i class="bi bi-geo-alt"></i>
        {{worker.address}}
    </p>
</div>
<div class="rating ms-auto">
    <i class="bi bi-star-fill text-warning"></i>
    <span>{{worker.rating}}</span>
</div>
</div>
<div class="mt-2">
 <p class="text-muted">{{worker.desc}}</p>
 <div class="worker-skill d-flex gap-3 text-muted">
    <p *ngFor="let item of worker.skills">{{item}}</p>
    <p>+1</p>
 </div>
 <hr>
</div>
<div class="d-flex justify-content-between">
<p><span class="text-muted">Experience:</span>{{worker.experience}}</p>
<button class="btn btn-primary">View Profile</button>
</div>
</div>
