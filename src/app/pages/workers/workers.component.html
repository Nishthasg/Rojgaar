<div class="p-3 worker_nav">
    <div class="d-flex align-items-center gap-1 ms-2">
        <i class="bi bi-arrow-left fs-4" (click)="goBack()"></i>
        <div class="input-group">
            <span class="input-group-text">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control" placeholder="Search workers or skills">
        </div>
    </div>
</div>
<div class="row">
    <div class="col-12 col-md-12 col-lg-3 col-xl-2">
        <div class="filter p-3 m-4">
            <div class="d-flex gap-2">
                <i class="bi bi-funnel"></i>
                <h5>Filters</h5>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" class="form-control" placeholder="eg. Mumbai">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select class="form-control">
                    <option selected>All Categories</option>
                    <option>Painter</option>
                </select>
            </div>
        </div>
    </div>
    <div class="col-12 col-md-12 col-lg-9 col-xl-10">
        <div class="mt-3 d-flex justify-content-between mx-2">
            <div class="ms-2">
                <h3>4 Workers Found</h3>
            </div>
            <div class="d-flex gap-2 me-2 position-relative">
                <i class="bi bi-filter"></i>
                <small>Short by:</small>
                <p (click)="showShortby()">{{shortby}}
                    <i class="bi bi-chevron-down"></i>
                </p>
                <div class="shortby" *ngIf="openShortby">
                    <p (click)="selectedFilter('Highest Rated')">Highest Rated <i *ngIf="shortby=='Highest Rated'"
                            class="bi bi-check-lg"></i></p>
                    <p (click)="selectedFilter('Most Experience')">Most Experience <i *ngIf="shortby=='Most Experience'"
                            class="bi bi-check-lg"></i></p>
                </div>
            </div>
        </div>
        <div class="row g-4 mx-2">
            <div class="col-12 col-md-6 col-lg-4" *ngFor="let item of workerList;">
                <app-worker-cards></app-worker-cards>
            </div>
        </div>
    </div>
</div>
