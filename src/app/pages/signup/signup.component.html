<div class="login-container">
    <div class="container-heading">
        <h2 class="text-center">Register as a Worker</h2>
        <p class="text-center">Create your profile to start getting jobs in your area.</p>
    </div>
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <div class="row g-4">
            <div class="col-12 col-sm-6">
                <div class="form-group">
                    <label>Full Name<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" placeholder="e.g. Ramesh Kumar" formControlName="name">
                    <div *ngIf="userForm.controls['name'].touched && userForm.controls['name'].hasError('required')">
                        <p class="text-danger">Name is required</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="form-group">
                    <label>Phone Number<span class="text-danger">*</span></label>
                    <input type="number" class="form-control" placeholder="e.g. 987654XXXX" formControlName="phone">
                    <p *ngIf="userForm.controls['phone'].touched && userForm.controls['phone'].hasError('required')" class="text-danger">Phone is required</p>
                </div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="form-group">
                    <label>Your Skills/Profession<span class="text-danger">*</span></label>
                    <select class="form-control" formControlName="skill">
                        <option selected>Select a profession</option>
                        <option>Cleaner</option>
                        <option>Painter</option>
                    </select>
                    <p class="text-danger" *ngIf="userForm.controls['skill'].touched && userForm.controls['skill'].hasError('required')">Skill is required</p>
                </div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="form-group">
                    <label>Experience(Years)</label>
                    <input class="form-control" type="number" formControlName="experience">
                </div>
            </div>
            <div>
                <div class="form-group">
                    <label>Area/City<span class="text-danger">*</span></label>
                    <input class="form-control" type="text" placeholder="e.g. Sector-23, Gurugram" formControlName="address">
                    <small class="form-text text-muted">Where do you mostly work?</small>
                    <p class="text-danger" *ngIf="userForm.controls['address'].touched && userForm.controls['address'].hasError('required')">Address is required</p>
                </div>
            </div>
            <div>
                <div class="form-group">
                    <label>About Your Work</label>
                    <textarea class="form-control" rows="4" cols="25" placeholder="Describe what kind of work you do, your specialities, etc." formControlName="work"></textarea>
                </div>
            </div>
        </div>
        <button class="btn btn-primary w-100 mt-4 py-2" type="submit">Create Profile</button>
         <p class="text-center mt-1">Already registerd? <a [routerLink]="['/']" class="text-primary">Login here</a></p>
    </form>
</div>
