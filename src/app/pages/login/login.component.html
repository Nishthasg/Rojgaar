<div class="login-container">
    <div class="container-heading">
        <h2 class="text-center">Login here !</h2>
    </div>
    <form >
        <div class="row g-4">
            <div class="col-12">
                <div class="form-group">
                    <label>Username/emailId</label>
                    <input type="email" class="form-control" placeholder="Type email or username" formControlName="email">
                </div>
            </div>
            <div class="col-12">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Type password" formControlName="password">
                    <p>Forget password?</p>
                </div>
            </div>
        </div>
        <button class="btn btn-primary w-100 mt-4 py-2" type="submit" [routerLink]="['/home']">Submit</button>
        <p class="text-center mt-2">Not registerd? <span class="cursor-pointer" [routerLink]="['/register']">signUp now</span></p>
    </form>
</div>
