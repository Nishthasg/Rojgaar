<div class="login-container">
    <div class="container-heading">
        <h2 class="text-center">Login here !</h2>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" >
        <div class="row g-4">
            <div class="col-12">
                <div class="form-group">
                    <label>Username/emailId<span class="text-danger">*</span></label>
                    <input type="email" class="form-control" placeholder="Type email or username" formControlName="username">
                    <div *ngIf="loginForm.controls['username'].touched && loginForm.controls['username'].hasError('required')">
                        <p class="text-danger">Username is required</p>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="form-group">
                    <label>Password<span class="text-danger">*</span></label>
                    <input type="password" class="form-control" placeholder="Type password" formControlName="password">
                    <div *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].hasError('required')">
                        <p class="text-danger">Username is required</p>
                    </div>
                    <div *ngIf="loginForm.controls['password'].hasError('minlength')">
                        <p class="text-danger">Incorrect password</p>
                    </div>
                    <p class="text-danger" *ngIf="loginForm.controls['password'].touched">Forget password?</p>
                </div>
            </div>
        </div>
        <button class="btn btn-primary w-100 mt-4 py-2" type="submit">Submit</button>
        <p class="text-center mt-2">Not registerd? <a class="cursor-pointer text-primary" [routerLink]="['/register']">signUp now</a></p>
    </form>
</div>
